# Model registry: a size ladder of small, tool-calling-capable instruct models.
#
# IMPORTANT: tool-calling support is TEMPLATE-dependent. Each model below must
# be launched with `--jinja` so llama.cpp applies the model's own chat/tool
# template. The startup probe in serve.sh fails loudly if a tool-call roundtrip
# does not parse.
#
# Each model has two ways to load it; serve.sh tries them in this order:
#   gguf: a local .gguf path (used if the file exists) — fastest, fully offline.
#   hf:   a Hugging Face "repo:quant" spec. llama.cpp downloads + caches it on
#         first run (needs internet ONCE), then serves offline afterwards.
# So out of the box you need no manual downloads — `hf` just works. Once you've
# downloaded a model, point `gguf` at it to stay fully offline.
#
# `port` is fixed per model so the client and Goose can find it deterministically.

models:
  - name: qwen2.5-0.5b
    display: "Qwen2.5 0.5B Instruct"
    params_b: 0.5
    port: 8101
    gguf: "~/models/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf"
    hf: "Qwen/Qwen2.5-0.5B-Instruct-GGUF:Q4_K_M"
    template: jinja # use the model's built-in template

  - name: qwen2.5-1.5b
    display: "Qwen2.5 1.5B Instruct"
    params_b: 1.5
    port: 8102
    gguf: "~/models/Qwen2.5-1.5B-Instruct-Q4_K_M.gguf"
    hf: "Qwen/Qwen2.5-1.5B-Instruct-GGUF:Q4_K_M"
    template: jinja

  - name: qwen2.5-3b
    display: "Qwen2.5 3B Instruct"
    params_b: 3.0
    port: 8103
    gguf: "~/models/Qwen2.5-3B-Instruct-Q4_K_M.gguf"
    hf: "Qwen/Qwen2.5-3B-Instruct-GGUF:Q4_K_M"
    template: jinja

  - name: qwen2.5-7b
    display: "Qwen2.5 7B Instruct"
    params_b: 7.0
    port: 8104
    gguf: "~/models/Qwen2.5-7B-Instruct-Q4_K_M.gguf"
    hf: "Qwen/Qwen2.5-7B-Instruct-GGUF:Q4_K_M"
    template: jinja

# The judge model runs on its own fixed port (see config.yaml judge.base_url).
judge:
  name: judge
  display: "Local judge (Qwen2.5 7B Instruct)"
  params_b: 7.0
  port: 8100
  gguf: "~/models/Qwen2.5-7B-Instruct-Q4_K_M.gguf"
  hf: "Qwen/Qwen2.5-7B-Instruct-GGUF:Q4_K_M"
  template: jinja
